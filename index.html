<script>
// ── Stars ──
(function(){ const s=document.getElementById('stars'); for(let i=0;i<65;i++){ const el=document.createElement('div'); el.className='star'; const sz=Math.random()*2+0.5; el.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+sz+'px;height:'+sz+'px;--d:'+(2+Math.random()*4)+'s;--o:'+(0.1+Math.random()*0.38)+';animation-delay:'+Math.random()*5+'s;'; s.appendChild(el); } })();

// ── Runtime data ──
let ARTICLES={}, CONTENT={}, SKILLS={}, YEARS={}, IMAGES={}, PROJECTS={};

// ── Filter state ──
let activeTag='all', activeSkill=null;
const tagFilterMap={'cert':['cert','edu','diploma','upskilling'],'volunteer':['volunteer','community']};

// ══════════════════════════════════════
// DATA LOAD — public Firestore REST (no API key needed for public read rules)
// Security: Firestore rules set to allow read:true, write:false
// The project ID is not a secret — it's a public identifier
// ══════════════════════════════════════
async function loadFromFirebase() {
  const loading=document.getElementById('loading-screen');
  const loadingText=document.getElementById('loading-text');
  try {
    loadingText.textContent='Loading roadmap...';
    const url=`https://firestore.googleapis.com/v1/projects/${FIRESTORE_PROJECT_ID}/databases/(default)/documents/roadmap/main`;
    const res=await fetch(url);
    if(!res.ok) {
      if(res.status===404) throw new Error('No data published yet. Open roadmap-editor.html and click Publish to Firebase.');
      if(res.status===403) throw new Error('Firestore rules are blocking public read. Set: allow read: if true in Firebase Console → Firestore → Rules.');
      throw new Error('Server returned '+res.status);
    }
    loadingText.textContent='Building timeline...';
    const doc=await res.json();
    const f=doc.fields;
    ARTICLES=JSON.parse(f.articles.stringValue);
    CONTENT=JSON.parse(f.content.stringValue);
    SKILLS=JSON.parse(f.skills.stringValue);
    YEARS=JSON.parse(f.years.stringValue);
    IMAGES=f.images?JSON.parse(f.images.stringValue):{};
    PROJECTS=f.projects?JSON.parse(f.projects.stringValue):{};
    buildTimeline(); buildSkillPills(); updateStats();
    loading.style.opacity='0'; loading.style.transition='opacity 0.4s';
    setTimeout(()=>{loading.style.display='none';},400);
    document.getElementById('view-roadmap').classList.add('active');
  } catch(e) {
    loadingText.textContent='';
    const d=document.createElement('div'); d.className='loading-error';
    d.innerHTML='❌ Failed to load<br><br>'+e.message;
    loading.appendChild(d); console.error('Load error:',e);
  }
}

function buildTimeline() {
  const root=document.getElementById('timeline-root');
  const yearGroups={};
  Object.keys(ARTICLES).forEach(id=>{const yr=YEARS[id]||9999;if(!yearGroups[yr])yearGroups[yr]=[];yearGroups[yr].push(id);});
  const yearColors={2026:'#bf7bff',2025:'#d4b8ff',2024:'#00e5cc',2023:'#4ade80',2022:'#fbbf24',2021:'#fb923c',2020:'#f87171',2019:'#fca5a5',2018:'#fca5a5',2017:'#fca5a5',2016:'#fdba74',2015:'#fcd34d',2014:'#86efac',2013:'#67e8f9',2012:'#a5b4fc'};
  const sortedYears=Object.keys(yearGroups).sort((a,b)=>b-a);
  root.innerHTML=sortedYears.map(yr=>{
    const ids=yearGroups[yr];
    const items=ids.map(id=>{
      const a=ARTICLES[id];
      return `<button class="item tag-${a.tag}" onclick="openArticle('${id}')"><span class="item-tag-wrap"><span class="tag tag-${a.tag}">${a.tagLabel}</span></span><div class="item-content"><div class="item-date">${a.date||''}</div><div class="item-title">${a.title||''}</div>${a.org?`<div class="item-org">${a.org}</div>`:''}</div><span class="item-arrow">→</span></button>`;
    }).join('');
    return `<div class="year-group yr-${yr}"><div class="year-header"><span class="year-label">${yr}</span><span class="year-node"></span></div><div class="items">${items}</div></div>`;
  }).join('');
}

function applyFilters() {
  const matchingTags=tagFilterMap[activeTag]?tagFilterMap[activeTag]:[activeTag];
  document.querySelectorAll('#view-roadmap .item').forEach(item=>{
    const id=item.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
    const tagMatch=activeTag==='all'||matchingTags.some(t=>item.classList.contains('tag-'+t));
    const skillMatch=!activeSkill||(id&&(SKILLS[id]||[]).includes(activeSkill));
    item.classList.toggle('hidden',!(tagMatch&&skillMatch));
  });
  document.querySelectorAll('.year-group').forEach(group=>{
    group.classList.toggle('all-hidden',group.querySelectorAll('.item:not(.hidden)').length===0);
  });
  updateFilterSummary(); updateStats();
}

function toMI(ym){return ym[0]*12+ym[1];}
function totalWorkMonths(ids){const now=new Date(),nowYM=[now.getFullYear(),now.getMonth()+1];const spans=ids.filter(id=>workRanges[id]).map(id=>{const r=workRanges[id];return[toMI(r.start),toMI(r.end==='present'?nowYM:r.end)];});if(!spans.length)return 0;spans.sort((a,b)=>a[0]-b[0]);const merged=[spans[0]];for(let i=1;i<spans.length;i++){const last=merged[merged.length-1];if(spans[i][0]<=last[1])last[1]=Math.max(last[1],spans[i][1]);else merged.push(spans[i]);}return merged.reduce((s,r)=>s+(r[1]-r[0]),0);}
function formatDuration(m){const y=Math.floor(m/12),mo=m%12;if(y===0)return mo+' mo';if(mo===0)return y+' yr'+(y!==1?'s':'');return y+' yr'+(y!==1?'s':'')+' '+mo+' mo';}

function openArticle(id) {
  const a=ARTICLES[id];if(!a)return;
  // Project items → show gallery instead of article
  if (a.tag === 'project') { openProjectGallery(id); return; }

  const bannerImg=IMAGES[id];
  const bannerEl=document.getElementById('art-banner');
  if(bannerImg){bannerEl.style.background=`url('${bannerImg}') center/cover no-repeat`;document.getElementById('art-icon').style.display='none';}
  else{bannerEl.style.background=a.bg;document.getElementById('art-icon').style.display='';}
  document.getElementById('art-icon').textContent=a.icon;
  const tagEl=document.getElementById('art-tag-el');tagEl.textContent=a.tagLabel;tagEl.className='tag tag-'+a.tag;
  document.getElementById('art-date').textContent=a.date;
  document.getElementById('art-title').textContent=a.title;
  const orgEl=document.getElementById('art-org');orgEl.textContent=a.org;orgEl.style.display=a.org?'block':'none';
  const content=CONTENT[id],contentEl=document.getElementById('art-content');
  if(content){
    const hl=(content.highlights||'').split('. ').filter(h=>h.trim()).map(h=>'<li>'+h.replace(/\.$/,'')+'</li>').join('');
    const h3 = (txt) => `<h3 style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:${a.color};letter-spacing:0.08em;text-transform:uppercase;margin:24px 0 10px;opacity:0.85;">${txt}</h3>`;
    // Render rich blocks if they exist
    const blocks = content.blocks || [];
    const blocksHTML = blocks.map(b => {
      if (b.type==='text' && b.content)
        return `<p>${b.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</p>`;
      if (b.type==='image' && b.src)
        return `<figure style="margin:20px 0;"><img src="${b.src}" style="width:100%;border-radius:10px;display:block;">${b.caption?`<figcaption style="font-size:11px;color:var(--muted);font-style:italic;text-align:center;margin-top:8px;">${b.caption}</figcaption>`:''}</figure>`;
      if (b.type==='video' && b.src)
        return `<figure style="margin:20px 0;"><video src="${b.src}" controls playsinline style="width:100%;border-radius:10px;background:#000;" preload="metadata"></video>${b.caption?`<figcaption style="font-size:11px;color:var(--muted);font-style:italic;text-align:center;margin-top:8px;">${b.caption}</figcaption>`:''}</figure>`;
      if ((b.type==='youtube') && (b.ytId||b.src)) {

        return `<figure style="margin:20px 0;"><div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:10px;"><iframe src="https://www.youtube.com/embed/${ytId}" style="position:absolute;inset:0;width:100%;height:100%;border:0;" allowfullscreen loading="lazy"></iframe></div>${b.caption?`<figcaption style="font-size:11px;color:var(--muted);font-style:italic;text-align:center;margin-top:8px;">${b.caption}</figcaption>`:''}</figure>`;
      }
      return '';
    }).filter(Boolean).join('');
    contentEl.innerHTML =
      (content.intro ? '<p>'+content.intro+'</p>' : '') +
      (blocksHTML ? blocksHTML : '') +
      (content.learned ? h3('What I Learned')+'<p>'+content.learned+'</p>' : '') +
      (hl ? h3('Key Highlights')+'<ul style="padding-left:18px;display:flex;flex-direction:column;gap:7px;">'+hl+'</ul>' : '');

  if(a.org){fo.textContent=a.org;fo.className='tag tag-'+a.tag;fo.style.display='inline-block';}else fo.style.display='none';

  else ss.style.display='none';

  window.scrollTo(0,0);setTimeout(()=>artView.classList.remove('slide-in'),350);

let _currentGalleryArticleId = null;

function resolveProjects(id) {
  const a = ARTICLES[id] || {};
  let yr = YEARS[id];
  if (!yr) { const m=(a.date||'').match(/\b(20\d{2})\b/); if(m) yr=m[1]; }
  yr = String(yr || '');
  let projects = PROJECTS[yr] || PROJECTS[parseInt(yr)] || [];
  if (!projects.length && yr) {
    const key = Object.keys(PROJECTS).find(k => String(k) === yr);
    if (key) projects = PROJECTS[key] || [];
  }
  return { projects, yr, a };
}

function renderBlocksHTML(blocks) {
  return (blocks||[]).map(b => {
    if (b.type==='text' && b.content)
      return `<div class="proj-block-text">${b.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`;

    if (b.type==='youtube' && (b.ytId||b.src)) {

            ${p.url ? `<a href="${p.url.startsWith('http')?p.url:'https://'+p.url}" target="_blank" rel="noopener" class="proj-link proj-external-link" style="border-color:${color}44;color:${color};font-size:9px;" onclick="event.stopPropagation()">Live →</a>` : ''}
          </div>
        </div>`;
      }).join('') + '</div>';

    // Event delegation — attach once after render
    const grid = document.getElementById('proj-grid-inner');
    if (grid) {
      grid.addEventListener('click', function(e) {
        if (e.target.closest('.proj-external-link')) return;
        const card = e.target.closest('[data-proj-index]');
        if (card) openProjectDetail(parseInt(card.dataset.projIndex), id);
      });
    }
  }

  document.getElementById('view-roadmap').classList.remove('active');
  document.getElementById('view-project-detail').classList.remove('active');
  const pv = document.getElementById('view-projects');
  pv.classList.add('active','slide-in');
  window.scrollTo(0,0);
  setTimeout(()=>pv.classList.remove('slide-in'),350);
}

function openProjectDetail(projIndex, articleId) {
  const id = articleId || _currentGalleryArticleId;
  const { projects, yr, a } = resolveProjects(id);
  const p = projects[projIndex]; if (!p) return;
  const color = p.color || '#f472b6';
  const STATUS_LABELS = { shipped:'✅ Shipped', wip:'🚧 In Progress', concept:'💡 Concept' };
  const techPills = (p.tech||[]).map(t=>`<span class="proj-tech-pill">${t}</span>`).join('');
  const blocksHTML = renderBlocksHTML(p.blocks);
  const safeUrl = p.url ? (p.url.startsWith('http')?p.url:'https://'+p.url) : '';

  document.getElementById('proj-detail-body').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;">
      <span class="tag tag-project" style="color:${color};border-color:${color};">${a.tagLabel||'Project'}</span>
      ${a.date ? `<span style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:0.06em;">${a.date}</span>` : ''}
    </div>
    <div class="proj-detail-status" style="color:${color}">${STATUS_LABELS[p.status]||''}</div>
    <div class="proj-detail-title">${p.title||'Untitled Project'}</div>
    <div class="proj-detail-meta">
      ${techPills}
      ${safeUrl ? `<a href="${safeUrl}" target="_blank" rel="noopener" class="proj-link" style="border-color:${color}44;color:${color}">View project →</a>` : ''}
    </div>
    <div class="proj-detail-story">
      ${blocksHTML||'<div style="opacity:0.35;font-family:sans-serif;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;">No story content yet</div>'}
    </div>`;

  document.getElementById('view-projects').classList.remove('active');
  const dv = document.getElementById('view-project-detail');
  dv.classList.add('active','slide-in');
  window.scrollTo(0,0);
  setTimeout(()=>dv.classList.remove('slide-in'),350);
}

function closeProjectDetail() {
  document.getElementById('view-project-detail').classList.remove('active');
  document.getElementById('view-projects').classList.add('active');
  window.scrollTo(0,0);
}

function goBack(){
  document.getElementById('view-article').classList.remove('active');
  document.getElementById('view-projects').classList.remove('active');
  document.getElementById('view-project-detail').classList.remove('active');
  document.getElementById('view-roadmap').classList.add('active');
  window.scrollTo(0,0);
}
function filterAndGoBack(skill){goBack();setTimeout(()=>{const p=document.querySelector('#skill-pills-grid [data-skill="'+skill+'"]');if(p)applySkillFilter(skill,p);},50);}

lution Architecture Governance</div><div class="panel-narrative-date">2025 – Present</div><p>Senior technical delivery at Cogent under governed solution architecture standards, extending the Power Platform through custom .NET APIs and HTTP integrations.</p></div></div>`},

function openPanel(id){

// ══════════════════════════════════════
// TAB BAR — quick type filter above the dropdowns
// ══════════════════════════════════════
const TAB_MAP = {
  'all':       'all',
  'work':      'work',
  'project':   'project',
  'cert':      'cert',       // covers cert + procert
  'community': 'volunteer',  // maps to volunteer tag
  'speaker':   'speaker',
  'hackathon': 'hackathon',
};

function setTab(tab, btn) {
  // Update tab button styles
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // Map tab to the internal tag filter
  const tagTarget = TAB_MAP[tab] || 'all';

  // For 'cert' tab we want both cert AND procert
  if (tab === 'cert') {
    activeTag = 'cert';
    // Also show procerts — override matchingTags logic
    document.querySelectorAll('#view-roadmap .item').forEach(item => {
      const tagMatch = item.classList.contains('tag-cert') || item.classList.contains('tag-procert');
      const id = item.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
      const skillMatch = !activeSkill || (id && (SKILLS[id]||[]).includes(activeSkill));
      item.classList.toggle('hidden', !(tagMatch && skillMatch));
    });
    document.querySelectorAll('.year-group').forEach(g => {
      g.classList.toggle('all-hidden', g.querySelectorAll('.item:not(.hidden)').length === 0);
    });
    // Sync the type dropdown pill
    document.querySelectorAll('.filter-pill[data-tag]').forEach(p => {
      p.classList.remove('active'); p.style.background='rgba(255,255,255,0.04)'; p.style.color='rgba(237,233,255,0.6)'; p.style.borderColor='rgba(255,255,255,0.15)';
    });
    document.getElementById('tag-active-label').textContent = '· Certs & Pro Certs';
    document.getElementById('tag-toggle').classList.add('active-filter');
    updateFilterSummary(); updateStats();
    return;
  }

  // For community tab map to volunteer
  if (tab === 'community') {
    const pill = document.querySelector('.filter-pill[data-tag="volunteer"]');
    if (pill) setTagFilter('volunteer', pill);
    return;
  }

  // Everything else — use existing setTagFilter
  if (tab === 'all') {
    clearAllFilters();
    return;
  }
  const pill = document.querySelector(`.filter-pill[data-tag="${tagTarget}"]`);
  if (pill) setTagFilter(tagTarget, pill);
}

// Keep tab bar in sync when type dropdown is used directly
const _origSetTagFilter = setTagFilter;
setTagFilter = function(tag, btn) {
  _origSetTagFilter(tag, btn);
  // Sync tab bar
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const tabMap = { all:'all', work:'work', project:'project', cert:'cert', procert:'cert', volunteer:'community', speaker:'speaker', hackathon:'hackathon' };
  const tabKey = tabMap[tag] || 'all';
  const tb = document.querySelector(`.tab-btn[data-tab="${tabKey}"]`);
  if (tb) tb.classList.add('active');
};

// DEMO IFRAME OVERLAY
// ══════════════════════════════════════
function openDemo(url, title) {
  if (!url) return;
  // Ensure protocol
  const safeUrl = url.startsWith('http') ? url : 'https://' + url;
  document.getElementById('demo-title').textContent = title || 'Live Demo';
  document.getElementById('demo-external-link').href = safeUrl;
  // Show loading state
  const frame = document.getElementById('demo-frame');
  frame.src = '';
  document.getElementById('demo-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  // Small delay so overlay renders before iframe starts loading
  setTimeout(() => { frame.src = safeUrl; }, 80);
}

function closeDemo() {
  document.getElementById('demo-overlay').classList.remove('open');
  document.getElementById('demo-frame').src = '';
  document.body.style.overflow = '';
}

// Close on Escape key
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDemo(); });

loadFromFirebase();
