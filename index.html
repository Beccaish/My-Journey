<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Roadmap · Becca Isherwood</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>

:root {
  --bg: #0e0c1e;
  --violet: #7c3aed;
  --violet-glow: #b06ef3;
  --teal: #2dd4bf;
  --mint: #6ee7b7;
  --gold: #fbbf24;
  --rose: #fb4b6e;
  --orange: #fb923c;
  --white: #f0ecff;
  --muted: #a89fc8;
  --border: rgba(176,110,243,0.35);

  /* tag accent colours — vivid & distinct */
  --c-cert:      #c77dff;
  --c-procert:   #00e5cc;
  --c-work:      #60b4ff;
  --c-hackathon: #ff6eb4;
  --c-volunteer: #4ade80;
  --c-speaker:   #38f0f0;
  --c-project:   #f472b6;
  --c-upskilling:#facc15;
  --c-org:       #a5b4fc;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 15% 20%, rgba(176,110,243,0.28) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 85% 70%, rgba(0,229,204,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 50% 30% at 50% 90%, rgba(255,110,180,0.12) 0%, transparent 60%);
}
#stars { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.star { position:absolute; background:white; border-radius:50%; animation:twinkle var(--d,3s) ease-in-out infinite; opacity:0; }
@keyframes twinkle { 0%,100%{opacity:0} 50%{opacity:var(--o,0.4)} }

/* ── VIEWS ── */
.view { display:none; position:relative; z-index:1; }
.view.active { display:block; }

/* ── TAG ── */
.tag {
  display:inline-block; font-size:9px; letter-spacing:0.12em; text-transform:uppercase;
  padding:2px 8px; border-radius:20px; border:1px solid currentColor;
  font-family:'DM Mono',monospace; white-space:nowrap; line-height:1.6;
}
.tag-cert       { color:var(--c-cert); }
.tag-procert    { color:var(--c-procert); }
.tag-work       { color:var(--c-work); }
.tag-edu        { color:var(--c-cert); }
.tag-diploma    { color:var(--c-cert); }
.tag-hackathon  { color:var(--c-hackathon); }
.tag-community  { color:var(--c-volunteer); }
.tag-upskilling { color:var(--c-upskilling); }
.tag-speaker    { color:var(--c-speaker); }
.tag-volunteer  { color:var(--c-volunteer); }
.tag-org        { color:var(--c-org); }
.tag-project    { color:var(--c-project); }

/* ════════════════════════════
   ROADMAP VIEW
════════════════════════════ */
#view-roadmap { max-width:720px; margin:0 auto; padding:48px 20px 120px; }

.header { text-align:center; margin-bottom:56px; }
.header-eyebrow { font-size:13px; letter-spacing:0.3em; color:var(--teal); text-transform:uppercase; margin-bottom:14px; opacity:0.9; font-family:'DM Mono',monospace; }
.header-title {
  font-family:'Syne',sans-serif; font-size:clamp(32px,8vw,58px); font-weight:800; line-height:1;
  background:linear-gradient(135deg,var(--white) 0%,var(--violet-glow) 50%,var(--teal) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  letter-spacing:-0.02em; margin-bottom:8px;
}
.header-sub { font-size:12px; color:var(--muted); letter-spacing:0.1em; font-family:'DM Mono',monospace; }
.export-btn {
  margin-top:16px; display:inline-flex; align-items:center; gap:6px;
  font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.12em;
  text-transform:uppercase; padding:7px 18px; border-radius:20px;
  border:1px solid rgba(0,229,204,0.35); background:rgba(0,229,204,0.08);
  color:var(--c-procert); cursor:pointer; transition:all 0.18s;
}
.export-btn:hover { background:rgba(0,229,204,0.18); border-color:rgba(0,229,204,0.6); color:var(--white); }
.export-btn:disabled { opacity:0.5; cursor:default; }

/* ── DUAL FILTERS ── */
.dual-filters {
  display:grid; grid-template-columns:1fr 1fr; gap:12px;
  margin-bottom:16px;
}
.filter-panel { position:relative; }
.filter-panel-label {
  font-size:8px; letter-spacing:0.2em; text-transform:uppercase;
  color:var(--muted); margin-bottom:6px; padding-left:2px;
}
.filter-toggle {
  width:100%; display:flex; align-items:center; justify-content:space-between;
  padding:9px 14px; border-radius:10px;
  background:rgba(255,255,255,0.05); border:1px solid rgba(168,85,247,0.25);
  color:var(--muted); font-family:'DM Mono',monospace; font-size:10px;
  letter-spacing:0.06em; cursor:pointer; transition:all 0.18s; white-space:nowrap; overflow:hidden;
}
.filter-toggle:hover { border-color:rgba(168,85,247,0.5); color:var(--white); }
.filter-toggle.active-filter { border-color:rgba(168,85,247,0.6); color:var(--white); background:rgba(168,85,247,0.1); }
.filter-toggle .arrow { transition:transform 0.2s; flex-shrink:0; margin-left:6px; }
.filter-toggle.open .arrow { transform:rotate(180deg); }
.filter-dropdown {
  display:none; position:absolute; top:calc(100% + 6px); left:0; right:0;
  z-index:100; padding:12px;
  background:rgba(19,16,42,0.98); border:1px solid rgba(168,85,247,0.3);
  border-radius:10px; backdrop-filter:blur(16px);
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  min-width:200px;
}
.filter-dropdown.open { display:block; }
.filter-pills-grid { display:flex; flex-wrap:wrap; gap:5px; }
.filter-pill {
  font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.1em; text-transform:uppercase;
  padding:4px 10px; border-radius:20px; border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.04); color:rgba(237,233,255,0.6);
  cursor:pointer; transition:all 0.15s ease;
}
.filter-pill:hover { background:rgba(255,255,255,0.09); color:var(--white); }
.filter-pill.active { color:#13102a; border-color:transparent; font-weight:600; background:var(--fc,#ede9ff); }
.filter-active-label { font-size:9px; color:#c084fc; margin-left:4px; overflow:hidden; text-overflow:ellipsis; }

/* Skill filter specifics */
.skill-search {
  width:100%; padding:7px 11px; border-radius:8px; margin-bottom:10px;
  background:rgba(255,255,255,0.06); border:1px solid rgba(168,85,247,0.2);
  color:var(--white); font-family:'DM Mono',monospace; font-size:11px;
  outline:none; transition:border-color 0.18s;
}
.skill-search::placeholder { color:var(--muted); opacity:0.6; }
.skill-search:focus { border-color:rgba(168,85,247,0.5); }
.skill-pills-grid { display:flex; flex-wrap:wrap; gap:5px; }
.skill-filter-pill {
  font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.1em; text-transform:uppercase;
  padding:4px 10px; border-radius:20px; border:1px solid rgba(168,85,247,0.3);
  background:rgba(168,85,247,0.07); color:rgba(237,233,255,0.65);
  cursor:pointer; transition:all 0.15s ease;
}
.skill-filter-pill:hover { background:rgba(168,85,247,0.18); color:var(--white); }
.skill-filter-pill.active { background:#a855f7; border-color:#a855f7; color:#13102a; font-weight:600; }
.skill-filter-pill.hidden-pill { display:none; }

/* Active filter summary bar */
.filter-summary {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 14px; border-radius:8px; margin-bottom:20px;
  background:rgba(168,85,247,0.1); border:1px solid rgba(168,85,247,0.25);
  font-size:10px; color:rgba(237,233,255,0.75); letter-spacing:0.05em;
}
.filter-clear {
  font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.1em; text-transform:uppercase;
  border:none; background:none; color:#c084fc; cursor:pointer; padding:0; transition:color 0.15s;
}
.filter-clear:hover { color:var(--white); }

.item.hidden { display:none; }
.year-group.all-hidden .year-node { opacity:0.2; }
.year-group.all-hidden .year-label { opacity:0.2; }
.year-group.all-hidden .items { opacity:0; height:0; overflow:hidden; margin:0; padding:0; }

.timeline { position:relative; }
.timeline::before {
  content:''; position:absolute; left:84px; top:0; bottom:0; width:2px;
  background:linear-gradient(to bottom,transparent 0%,var(--violet) 5%,var(--violet-glow) 30%,var(--teal) 60%,var(--mint) 85%,transparent 100%);
  opacity:0.35;
}

.year-group { margin-bottom:8px; animation:fadeUp 0.45s ease both; }
.year-header { display:flex; align-items:center; margin-bottom:6px; }
.year-label {
  font-family:'Syne',sans-serif; font-size:18px; font-weight:800;
  width:84px; flex-shrink:0; text-align:right; padding-right:20px; line-height:1;
}
.year-node {
  width:12px; height:12px; border-radius:50%; border:2px solid;
  flex-shrink:0; z-index:2; margin-left:-6px; position:relative;
}
.year-node::after { content:''; position:absolute; inset:-4px; border-radius:50%; opacity:0.25; border:1px solid currentColor; }

.items { padding-left:96px; display:flex; flex-direction:column; gap:4px; }

.item {
  display:flex; align-items:flex-start; gap:10px;
  padding:10px 12px; border-radius:10px;
  border:1px solid rgba(255,255,255,0.07); cursor:pointer;
  transition:border-color 0.2s, background 0.2s, transform 0.15s;
  position:relative; background:rgba(255,255,255,0.04);
  -webkit-tap-highlight-color:transparent; text-align:left; width:100%;
}
.item:hover { border-color:rgba(255,255,255,0.18); transform:translateX(2px); }

/* Per-type card tints */
.item.tag-cert      { background:rgba(199,125,255,0.07); border-color:rgba(199,125,255,0.15); }
.item.tag-cert:hover{ background:rgba(199,125,255,0.14); border-color:rgba(199,125,255,0.35); }
.item.tag-procert      { background:rgba(0,229,204,0.07); border-color:rgba(0,229,204,0.15); }
.item.tag-procert:hover{ background:rgba(0,229,204,0.14); border-color:rgba(0,229,204,0.35); }
.item.tag-work      { background:rgba(96,180,255,0.07); border-color:rgba(96,180,255,0.15); }
.item.tag-work:hover{ background:rgba(96,180,255,0.14); border-color:rgba(96,180,255,0.35); }
.item.tag-hackathon      { background:rgba(255,110,180,0.07); border-color:rgba(255,110,180,0.15); }
.item.tag-hackathon:hover{ background:rgba(255,110,180,0.14); border-color:rgba(255,110,180,0.35); }
.item.tag-volunteer      { background:rgba(74,222,128,0.07); border-color:rgba(74,222,128,0.15); }
.item.tag-volunteer:hover{ background:rgba(74,222,128,0.14); border-color:rgba(74,222,128,0.35); }
.item.tag-speaker      { background:rgba(56,240,240,0.07); border-color:rgba(56,240,240,0.15); }
.item.tag-speaker:hover{ background:rgba(56,240,240,0.14); border-color:rgba(56,240,240,0.35); }
.item.tag-project      { background:rgba(244,114,182,0.07); border-color:rgba(244,114,182,0.15); }
.item.tag-project:hover{ background:rgba(244,114,182,0.14); border-color:rgba(244,114,182,0.35); }
.item::before {
  content:''; position:absolute; left:-20px; top:50%;
  transform:translateY(-50%); width:5px; height:5px;
  border-radius:50%; background:currentColor; opacity:0.4;
}
.item-tag-wrap { flex-shrink:0; padding-top:1px; }
.item-content { flex:1; min-width:0; }
.item-date { font-size:10px; opacity:0.55; margin-bottom:3px; letter-spacing:0.03em; color:var(--white); font-family:'DM Mono',monospace; }
.item-title { font-size:13px; line-height:1.4; font-weight:500; color:var(--white); opacity:0.95; font-family:'Inter',sans-serif; }
.item-org { font-size:11px; opacity:0.6; font-style:italic; margin-top:2px; color:var(--white); font-family:'Inter',sans-serif; }
.item-arrow { font-size:12px; opacity:0.25; flex-shrink:0; align-self:center; margin-left:4px; transition:opacity 0.2s; }
.item:hover .item-arrow { opacity:0.7; }

.yr-2026 .year-label{color:#bf7bff} .yr-2026 .year-node{color:#bf7bff;border-color:#bf7bff;box-shadow:0 0 14px #bf7bff88}
.yr-2025 .year-label{color:#d4b8ff} .yr-2025 .year-node{color:#d4b8ff;border-color:#d4b8ff;box-shadow:0 0 8px #d4b8ff44}
.yr-2024 .year-label{color:#00e5cc} .yr-2024 .year-node{color:#00e5cc;border-color:#00e5cc;box-shadow:0 0 8px #00e5cc44}
.yr-2023 .year-label{color:#4ade80} .yr-2023 .year-node{color:#4ade80;border-color:#4ade80;box-shadow:0 0 8px #4ade8044}
.yr-2022 .year-label{color:#fbbf24} .yr-2022 .year-node{color:#fbbf24;border-color:#fbbf24;box-shadow:0 0 8px #fbbf2444}
.yr-2021 .year-label{color:#fb923c} .yr-2021 .year-node{color:#fb923c;border-color:#fb923c;box-shadow:0 0 8px #fb923c44}
.yr-2020 .year-label{color:#f87171} .yr-2020 .year-node{color:#f87171;border-color:#f87171;box-shadow:0 0 8px #f8717144}
.yr-2017 .year-label{color:#fca5a5} .yr-2017 .year-node{color:#fca5a5;border-color:#fca5a5;box-shadow:0 0 8px #fca5a544}
.yr-2016 .year-label{color:#fdba74} .yr-2016 .year-node{color:#fdba74;border-color:#fdba74;box-shadow:0 0 8px #fdba7444}
.yr-2015 .year-label{color:#fcd34d} .yr-2015 .year-node{color:#fcd34d;border-color:#fcd34d;box-shadow:0 0 8px #fcd34d44}
.yr-2014 .year-label{color:#86efac} .yr-2014 .year-node{color:#86efac;border-color:#86efac;box-shadow:0 0 8px #86efac44}
.yr-2013 .year-label{color:#67e8f9} .yr-2013 .year-node{color:#67e8f9;border-color:#67e8f9;box-shadow:0 0 8px #67e8f944}
.yr-2012 .year-label{color:#a5b4fc} .yr-2012 .year-node{color:#a5b4fc;border-color:#a5b4fc;box-shadow:0 0 8px #a5b4fc44}

.legend { display:flex; flex-wrap:wrap; gap:10px 20px; margin-top:52px; padding-top:24px; border-top:1px solid rgba(168,85,247,0.2); justify-content:center; }
.legend-item { display:flex; align-items:center; gap:6px; font-size:9px; opacity:0.75; letter-spacing:0.1em; text-transform:uppercase; }
.legend-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

/* ════════════════════════════
   ARTICLE VIEW
════════════════════════════ */
#view-article { max-width:720px; margin:0 auto; padding:0 0 80px; }

.back-nav { padding:20px 20px 0; }
.back-btn {
  display:inline-flex; align-items:center; gap:6px;
  font-size:11px; letter-spacing:0.1em; color:var(--muted);
  text-transform:uppercase; border:none; background:none; cursor:pointer;
  font-family:'DM Mono',monospace; transition:color 0.2s; padding:0;
}
.back-btn:hover { color:var(--white); }

.banner {
  margin:16px 20px 0; border-radius:16px; overflow:hidden; position:relative;
  height:200px; display:flex; align-items:center; justify-content:center;
}
.banner-inner { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; }
.banner-icon { font-size:40px; opacity:0.75; }
.banner-hint { font-size:9px; letter-spacing:0.15em; text-transform:uppercase; opacity:0.25; }
.banner-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(10,8,18,0.8) 0%,transparent 60%); z-index:2; pointer-events:none; }

.article-body { padding:24px 20px 0; }
.article-meta { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
.article-date { font-size:11px; color:var(--muted); letter-spacing:0.06em; }
.article-title { font-family:'Syne',sans-serif; font-size:clamp(20px,5vw,28px); font-weight:800; line-height:1.15; color:var(--white); margin-bottom:6px; }
.article-org { font-size:12px; color:var(--muted); font-style:italic; margin-bottom:24px; }

/* ── ARTICLE FOOTER ── */
.article-footer {
  margin-top:40px; padding-top:24px;
  border-top:1px solid rgba(255,255,255,0.08);
  display:flex; flex-direction:column; gap:20px;
}
.footer-top-row {
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:12px;
}
.footer-tag-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.footer-back-btn {
  font-size:11px; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--muted); border:none; background:none; cursor:pointer;
  font-family:'DM Mono',monospace; transition:color 0.2s; padding:0;
}
.footer-back-btn:hover { color:var(--white); }

/* ── SKILL TAGS SECTION (article footer) ── */
.skill-tags-section {
  display:flex; flex-direction:column; gap:10px;
}
.skill-tags-label {
  font-size:9px; letter-spacing:0.2em; text-transform:uppercase;
  color:var(--muted); opacity:0.6; font-family:'DM Mono',monospace;
}
.skill-tags-row { display:flex; flex-wrap:wrap; gap:8px; }
.skill-pill {
  display:inline-block;
  font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.08em;
  text-transform:uppercase; padding:5px 14px; border-radius:999px;
  border:1px solid currentColor; background:transparent;
  cursor:pointer; transition:all 0.15s ease; line-height:1.5;
  opacity:0.75; white-space:nowrap;
}
.skill-pill:hover { opacity:1; background:rgba(255,255,255,0.06); }
.stats-bar {
  display:flex; align-items:center; gap:16px;
  margin-top:52px; padding:20px 24px;
  border-radius:14px;
  background:rgba(168,85,247,0.08);
  border:1px solid rgba(168,85,247,0.2);
  transition:all 0.3s ease;
}
.stats-icon {
  font-size:28px; flex-shrink:0; opacity:0.7;
  transition:all 0.3s ease;
}
.stats-content { flex:1; min-width:0; }
.stats-value {
  font-family:'Syne',sans-serif; font-size:clamp(22px,4vw,32px);
  font-weight:800; line-height:1; color:var(--white);
  margin-bottom:5px; transition:color 0.3s ease;
}
.stats-label {
  font-size:10px; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--muted); line-height:1.5;
}
.stats-sub {
  font-size:10px; color:var(--muted); margin-top:3px;
  letter-spacing:0.05em; opacity:0.7;
}

@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.year-group:nth-child(1){animation-delay:0.05s}
.year-group:nth-child(2){animation-delay:0.10s}
.year-group:nth-child(3){animation-delay:0.15s}
.year-group:nth-child(4){animation-delay:0.20s}
.year-group:nth-child(5){animation-delay:0.25s}
.year-group:nth-child(6){animation-delay:0.30s}
.year-group:nth-child(7){animation-delay:0.35s}
.year-group:nth-child(8){animation-delay:0.40s}

.slide-in { animation: slideIn 0.3s ease both; }
@keyframes slideIn { from{opacity:0;transform:translateX(18px)} to{opacity:1;transform:translateX(0)} }

/* ── BOTTOM DOCK ── */
.dock {
  position:fixed; bottom:0; left:0; right:0; z-index:200;
  display:flex; justify-content:center; padding:12px 20px 20px;
  background:linear-gradient(to top,rgba(14,12,30,0.98) 60%,transparent 100%);
  pointer-events:none;
}
.dock-inner {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:8px; width:100%; max-width:720px; pointer-events:all;
}
.dock-btn {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:4px; padding:10px 8px; border-radius:12px;
  border:1px solid rgba(176,110,243,0.2); background:rgba(14,12,30,0.88);
  cursor:pointer; transition:all 0.18s; backdrop-filter:blur(12px);
  font-family:'DM Mono',monospace;
}
.dock-btn:hover:not(:disabled) { border-color:rgba(176,110,243,0.5); background:rgba(176,110,243,0.1); }
.dock-btn.active { border-color:rgba(176,110,243,0.6); background:rgba(176,110,243,0.15); }
.dock-btn:disabled { opacity:0.28; cursor:default; }
.dock-btn-icon { font-size:18px; line-height:1; }
.dock-btn-label {
  font-size:8px; letter-spacing:0.12em; text-transform:uppercase;
  color:var(--muted); line-height:1.3; text-align:center;
}
.dock-btn:hover:not(:disabled) .dock-btn-label,
.dock-btn.active .dock-btn-label { color:var(--white); }

/* ── PANEL VIEW ── */
#view-panel {
  position:fixed; inset:0; z-index:100;
  background:var(--bg); overflow-y:auto; display:none;
}

.panel-nav {
  display:flex; align-items:center; padding:20px 20px 12px;

  background:linear-gradient(to bottom,var(--bg) 80%,transparent 100%);
}
.panel-back-btn {
  display:inline-flex; align-items:center; gap:6px;
  font-size:11px; letter-spacing:0.1em; color:var(--muted);
  text-transform:uppercase; border:none; background:none; cursor:pointer;
  font-family:'DM Mono',monospace; transition:color 0.2s; padding:0;
}
.panel-back-btn:hover { color:var(--white); }
.panel-body { max-width:720px; margin:0 auto; padding:8px 20px 120px; }
.panel-eyebrow {
  font-size:9px; letter-spacing:0.3em; text-transform:uppercase;

}
.panel-title {
  font-family:'Syne',sans-serif; font-size:clamp(24px,6vw,40px);
  font-weight:800; line-height:1.05; letter-spacing:-0.02em;

  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:32px;
}
.panel-section { margin-bottom:32px; }
.panel-section-title {
  font-family:'Syne',sans-serif; font-size:11px; font-weight:700;
  letter-spacing:0.2em; text-transform:uppercase;
  color:var(--c-procert); margin-bottom:14px; opacity:0.9;
}
.panel-competency { margin-bottom:16px; }
.panel-competency-cat {

}
.panel-tags { display:flex; flex-wrap:wrap; gap:5px; }
.panel-tag {

.panel-synthesis-dot {

.panel-synthesis-text strong { color:var(--white); font-weight:600; }

/* ── ARTICLE CONTENT (dynamic) ── */
#art-content { font-family:'Inter',sans-serif; font-size:14px; line-height:1.85; color:rgba(237,233,255,0.88); }
#art-content p { margin-bottom:16px; }

.article-org { font-size:12px; color:var(--muted); font-style:italic; margin-bottom:24px; font-family:'Inter',sans-serif; }
.article-date { font-size:11px; color:var(--muted); letter-spacing:0.04em; font-family:'DM Mono',monospace; }
.skill-tags-label { font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); opacity:0.7; font-family:'DM Mono',monospace; }

/* ── RESPONSIVE ── */

/* Tablet (600px+) */
@media(min-width:600px){
  .banner { height:260px; }
  .article-title { font-size:28px; }
  .header-eyebrow { font-size:14px; letter-spacing:0.35em; }
  .dock-btn-label { font-size:9px; }
}

/* Desktop (820px+) — centre in viewport with comfortable padding */
@media(min-width:820px){
  #view-roadmap { padding:60px 40px 140px; }
  .dual-filters { gap:16px; }
  .item { padding:12px 16px; }
  .item-title { font-size:14px; }
  .year-label { font-size:20px; width:92px; }
  .timeline::before { left:92px; }
  .items { padding-left:108px; }
  .stats-bar { padding:24px 28px; }
  .dock-inner { gap:12px; }
  .dock-btn { padding:12px 10px; }
}

/* Mobile — compressed timeline, stacked layout */
@media(max-width:479px){
  #view-roadmap { padding:36px 14px 120px; }
  .header { margin-bottom:40px; }
  .header-eyebrow { font-size:11px; letter-spacing:0.2em; }
  .header-title { font-size:clamp(28px,9vw,48px); }
  .header-sub { font-size:10px; }

  /* Compress the year column so items have room */
  .year-label { font-size:14px; width:62px; padding-right:12px; }
  .timeline::before { left:62px; }
  .items { padding-left:74px; }
  .year-node { width:10px; height:10px; margin-left:-5px; }

  /* Item cards */
  .item { padding:9px 10px; gap:7px; }
  .item-tag-wrap { padding-top:2px; }
  .item-title { font-size:12px; }
  .item-date { font-size:9px; }
  .item-org { font-size:10px; }
  .item-arrow { display:none; }
  .tag { font-size:8px; padding:2px 6px; }

  /* Filters — stack on very small screens */
  .dual-filters { grid-template-columns:1fr 1fr; gap:8px; }
  .filter-toggle { font-size:9px; padding:8px 10px; }
  .filter-panel-label { font-size:7px; }

  /* Stats bar */
  .stats-bar { padding:14px 16px; gap:12px; }
  .stats-icon { font-size:22px; }
  .stats-value { font-size:clamp(18px,5vw,26px); }
  .stats-label { font-size:9px; }

  /* Article view */
  .article-body { padding:18px 14px 0; }
  .back-nav { padding:16px 14px 0; }
  .banner { margin:12px 14px 0; height:160px; border-radius:12px; }
  .article-title { font-size:clamp(18px,5vw,24px); }
  #art-content { font-size:13px; }
  #art-content li { font-size:13px; }

  /* Dock */
  .dock { padding:10px 12px 16px; }
  .dock-btn { padding:8px 4px; border-radius:10px; gap:3px; }
  .dock-btn-icon { font-size:16px; }
  .dock-btn-label { font-size:7px; letter-spacing:0.08em; }

  /* Panel */
  .panel-body { padding:6px 14px 100px; }
  .panel-title { font-size:clamp(22px,7vw,34px); margin-bottom:24px; }
  .panel-narrative p, .panel-synthesis-text { font-size:13px; }
}
</style>

const articleContent = {
  'copilot-command-specialist': { intro: "Achieving the Command Specialist badge represented a significant step forward in my Copilot Studio journey. This credential sits at the top of the Global AI Community's agent pathway, focusing on advanced agent orchestration, multi-topic design, and governance patterns for enterprise deployments.", learned: "I deepened my understanding of how to architect agents that handle complex, branching conversation flows without losing context. The emphasis on fallback strategies and escalation paths gave me practical frameworks I now apply directly in client solutions.", highlights: "Completed the full Global AI Community agent pathway. Applied command-level concepts immediately in a live Cogent project. Reinforced my positioning as a Copilot Studio specialist in the South African market." },
  'ai-fluency-anthropic': { intro: "This course from Anthropic provided a structured foundation in AI literacy — covering how large language models work, how to prompt effectively, and how to think critically about AI outputs. It sits at the intersection of technical understanding and responsible use.", learned: "Understanding the mechanics behind model behaviour changed how I approach prompt design. I came away with a much clearer mental model of why certain instructions produce reliable results and others don't, which directly improves my client advisory work.", highlights: "Completed Anthropic's official AI fluency framework. Strengthened prompt engineering instincts across Power Platform AI Builder and Copilot Studio. Added a vendor-recognised credential to my AI portfolio." },
  'ethics-of-ai-helsinki': { intro: "The University of Helsinki's Ethics of AI course offered a rigorous, academic perspective on the societal implications of artificial intelligence. From bias and fairness to transparency and accountability, the curriculum pushed me to think beyond functionality and consider impact.", learned: "I gained frameworks for evaluating AI systems not just on performance but on equity and harm. This directly informs how I design automation solutions — particularly when working in data-sensitive sectors where decisions affect real people.", highlights: "Completed a university-level ethics curriculum recognised internationally. Developed a personal ethics checklist I apply to AI solution designs. Broadened my perspective beyond technical implementation to systemic responsibility." },
  'copilot-operative': { intro: "The Operative credential from the Global AI Community marked my progression beyond the basics of Copilot Studio. At this level, the focus shifted to building production-ready agents — handling authentication, integrating with external systems, and managing conversation state effectively.", learned: "Working through the Operative pathway sharpened my ability to connect Copilot Studio agents to real data sources via Power Platform connectors. I also got hands-on with adaptive cards and variable management, which opened up much richer interaction patterns.", highlights: "Second tier of the Global AI Community's structured agent pathway. Practical application in client-facing automation projects. Foundation for advancing to Command Specialist level." },
  'copilot-recruit': { intro: "The Recruit badge was my formal entry point into the Global AI Community's Copilot Studio certification pathway. It covered the fundamentals of conversational AI design — topics, entities, actions, and the basics of deploying an agent to Microsoft Teams and web surfaces.", learned: "Starting a structured pathway rather than learning ad hoc filled important gaps in my conceptual understanding. I built a cleaner mental model of how topics connect and how to design conversations that feel natural rather than mechanical.", highlights: "Entry point to a structured AI agent certification pathway. Immediate application to Power Platform projects at Cogent. Foundation for the Operative and Command Specialist credentials." },
  'pp-functional-consultant': { intro: "Earning the Microsoft Certified Power Platform Functional Consultant Associate certification was a major professional milestone. This credential validates the ability to configure, customise, and extend the Power Platform across model-driven apps, automated workflows, and virtual agent deployments — all within real enterprise contexts.", learned: "The certification process consolidated years of hands-on experience into a formally recognised body of knowledge. Preparing for the exam surfaced gaps in my understanding of Dataverse table relationships and solution lifecycle management that I've since addressed.", highlights: "Microsoft-recognised professional certification. Directly strengthens client trust and proposal credibility. Supports positioning as a specialist consultant in the South African and broader African market." },
  'cogent-special-projects': { intro: "Leading the end-to-end delivery of governed Microsoft Power Platform solutions in a senior technical capacity — spanning requirements analysis, solution design, development, deployment, documentation, and formal handover. The role extends the platform through custom .NET APIs and HTTP integrations, enabling secure system-to-system communication and advanced automation scenarios. Collaboration with a Solution Architect ensures that business requirements translate into scalable, maintainable solutions aligned with enterprise governance standards.", learned: "Operating within formal architectural governance has changed how I think about solution design. The discipline of documenting decisions, defining integration patterns upfront, and planning for long-term supportability is different from simply delivering what works. It has made my technical reasoning more rigorous and my client conversations more credible — particularly around trade-offs between speed and maintainability.", highlights: "Lead end-to-end Power Platform solution delivery under established architectural standards. Design and build business applications using Power Apps and Power Pages supporting internal and external user journeys. Develop and configure SharePoint sites, lists, and libraries integrated with Power Platform components. Extend platform capabilities through custom .NET APIs and HTTP integrations for secure system-to-system communication. Collaborate with Solution Architecture to translate business requirements into scalable solutions. Contribute to platform selection, integration pattern definition, data modeling, and long-term supportability planning. Produce comprehensive technical and user documentation to drive adoption, governance, and operational continuity." },
  'upskilling-host': { intro: "Hosting community upskilling sessions grew out of a recognition that access to quality tech education in South Africa remains uneven. I began running sessions covering Power Platform basics, AI literacy, and practical automation skills — both online and in person — for people at various stages of their careers.", learned: "Teaching is one of the most effective ways to deepen your own understanding. Running these sessions forced me to articulate concepts clearly, anticipate confusion, and build explanations that work for different learning styles. It also connected me to a much wider professional network.", highlights: "Delivered sessions to diverse audiences across career levels. Built reusable learning materials covering Power Platform and AI fundamentals. Strengthened community ties and reinforced personal brand as a knowledgeable, generous practitioner." },
  'esports-streaming': { intro: "Streaming Minecraft and Call of Duty Mobile was a personal creative outlet that also developed real skills in content production, audience engagement, and community building. It sat alongside my professional work as a space to explore digital culture and stay connected to the gaming community.", learned: "Running a stream teaches you to multitask under pressure — managing gameplay, chat interaction, and technical setup simultaneously. I developed a much stronger instinct for what keeps an audience engaged, which has fed back into how I think about user experience in professional contexts.", highlights: "Built a consistent content production habit. Developed real-time audience engagement skills. Stayed connected to gaming culture in a hands-on way." },
  'sdg-johannesburg': { intro: "The University of Johannesburg's course on Sustainable Development Goals provided a valuable macro-level context for the work I do in digital transformation. Understanding the SDG framework — particularly goals relating to decent work, reduced inequalities, and innovation — shapes how I think about the broader purpose of technology solutions.", learned: "I came away with a stronger vocabulary for articulating impact beyond technical outputs. When I build automation that frees up a team's time, or design an accessible digital experience, I can now frame that work within a globally recognised framework for positive change.", highlights: "Completed a recognised course in sustainability and development. Integrated SDG thinking into how I frame the value of digital solutions. Added academic depth to my understanding of technology's social role." },
  'esports-lead-eduvos': { intro: "Leading the esports community at Eduvos was one of the most creatively fulfilling roles I've held. I organised game jams, hackathons, and competitive events that brought students together and gave them a space to build technical and teamwork skills in a context they were genuinely passionate about.", learned: "Organising events at scale — handling logistics, communication, partnerships, and on-the-day execution — built a set of project management muscles that translate directly into professional delivery work. I also learned a great deal about motivating volunteers and building culture.", highlights: "Led a student esports community from the ground up. Organised multiple successful game jams and hackathons. Created a pipeline between gaming enthusiasm and technical skill development." },
  'wigi-mentee': { intro: "Being selected as a mentee by Women in Gaming International, in partnership with Riot Games, was both an honour and a genuinely transformative experience. The programme paired me with industry professionals who offered honest, practical guidance on navigating a career at the intersection of technology and gaming.", learned: "The mentorship challenged me to think more intentionally about where I wanted to go, rather than just responding to opportunities as they arose. Conversations about visibility, positioning, and self-advocacy have had a lasting effect on how I approach my career.", highlights: "Selected for a globally recognised women in tech and gaming mentorship programme. Built connections with international industry professionals. Developed a more strategic approach to career development and personal branding." },
  'eco-city-hackathon': { intro: "Placing in the top 10 of the Eco City Game Hackathon run by Ayoba was the result of rapid, high-pressure creative and technical collaboration. The challenge was to design a game concept that addressed urban sustainability — a brief that pushed me to think across design, narrative, and impact simultaneously.", learned: "Hackathons teach you to make decisive creative calls under time pressure and to ship something imperfect but real. Working within tight constraints forces a kind of clarity that more open-ended projects rarely demand. I also learned a great deal about what makes a game concept resonate with judges.", highlights: "Top 10 placement in a nationally recognised game hackathon. Demonstrated ability to execute under pressure and within constraints. Experience combining game design thinking with real-world sustainability challenges." },
  'eduvos-developer': { intro: "Joined a national academic environment as a Microsoft Dynamics and Power Platform Developer, building and managing enterprise applications with deep integration into Microsoft Dynamics 365. The role required a dual focus on back-end data integration and front-end UI/UX design, delivering responsive and accessible applications for a diverse user base across the academic sector. Cross-team collaboration to gather business requirements, optimize existing solutions, and provide ongoing technical support reinforced the importance of maintainable architecture and user-centred design.", learned: "Over two years in a complex, regulated environment gave me depth that breadth alone cannot provide. I learned to manage solution lifecycle properly, to advocate for technical decisions with non-technical stakeholders, and to build things that actually get adopted rather than just delivered. Working within Dynamics 365 at scale shifted my thinking from feature delivery to system stewardship.", highlights: "Developed and managed enterprise applications using Power Apps and Power Pages integrated with Microsoft Dynamics 365. Applied UI/UX design principles to create responsive and accessible user interfaces for diverse stakeholder groups. Collaborated across functional teams to gather business requirements and translate them into technical solutions. Managed analytics integrations to enhance data visibility and decision-making capabilities. Provided ongoing solution optimization and technical support across the national team." },
  'teens-in-ai': { intro: "Mentoring a team through the Teens in AI programme was one of the most rewarding experiences of my career. Supporting young people — particularly young women — as they designed and built an AI solution from scratch, and watching them place third internationally, was extraordinary.", learned: "Mentoring teenagers requires a completely different communication style to working with professional peers. I learned to explain abstract technical concepts in concrete, relatable terms, and to build confidence in people who were doubting their own abilities. That skill has made me a better communicator across the board.", highlights: "Supported a team to a 3rd place international finish. Contributed to increasing diversity in AI by supporting young women in tech. Developed coaching and communication skills that have transferred into professional contexts." },
  'osint-judge': { intro: "Being invited to judge the Global OSINT Search Party CTF by Canvas Credentials was a recognition of my growing profile in the cyber and information security community. The competition tested participants' ability to gather, verify, and synthesise open-source intelligence under time pressure.", learned: "Sitting on the judging side of a CTF gave me a new appreciation for what separates good OSINT practice from great OSINT practice — specifically the quality of documentation, the clarity of reasoning chains, and the ability to distinguish signal from noise.", highlights: "Recognised as a subject matter expert in the OSINT and cybersecurity community. Gained insight into competitive CTF formats and evaluation criteria. Strengthened connections within the global security practitioner network." },
  'ui-ux-codecademy': { intro: "Completing Codecademy's Introduction to UI and UX Design course gave me a formal grounding in design principles that I had largely been applying intuitively. The course covered user research methods, wireframing, prototyping, and the fundamentals of visual hierarchy and accessibility.", learned: "Formalising what I already knew in practice was clarifying in unexpected ways. The course gave me a shared vocabulary for design decisions — one I now use to communicate more precisely with designers and developers when collaborating on solutions.", highlights: "Formal credential in UX and UI fundamentals from a recognised platform. Strengthened design communication skills used in Power Apps and web projects. Added to a growing portfolio of design-focused qualifications." },
  'hnd-ux-upskillist': { intro: "Completing the Higher National Diploma in UX Design through Upskillist was a year-long commitment to deepening my design expertise. The programme covered the full UX process — from research and personas through to interaction design and usability testing — at a level of rigour that short courses don't provide.", learned: "A diploma-length programme forces you to sit with complexity rather than moving quickly past it. I developed a genuine research-first mindset and a much stronger ability to design for users I'm not myself — a skill that matters enormously in both product and consulting work.", highlights: "Diploma-level qualification in UX Design. Comprehensive coverage of the end-to-end design process. Applied learning directly to projects delivered during the same period." },
  'frontend-engineer-codecademy': { intro: "Codecademy's Front-End Engineer certification path took me from foundational HTML and CSS through to JavaScript, React, and the broader ecosystem of modern front-end development. It was a structured, rigorous curriculum that filled gaps and reinforced existing knowledge simultaneously.", learned: "Going back to basics with intent is humbling and useful in equal measure. I found myself unlearning shortcuts and understanding why best practices exist — particularly around accessibility, semantic HTML, and performance. That understanding shows up in everything I build.", highlights: "Comprehensive front-end certification covering HTML, CSS, JavaScript, and React. Directly applicable to Power Apps canvas app development and custom web builds. Strengthened ability to collaborate with dedicated front-end developers." },
  'ux-austin-peay': { intro: "Austin Peay State University's UX Design programme offered an academically grounded approach to user experience, complementing the more applied learning I was doing elsewhere in 2022. The curriculum emphasised research methodology, cognitive psychology, and the theoretical underpinnings of human-computer interaction.", learned: "Understanding the cognitive science behind UX decisions — why certain layouts reduce cognitive load, how mental models form, why error prevention matters more than error recovery — gave me a richer foundation for every design decision I make.", highlights: "University-level academic grounding in UX theory and practice. Complementary to concurrent applied UX learning in 2022. Strengthened research and evaluation skills." },
  'react-native-designcode': { intro: "Designcode.io's React Native for Designers certificate was a natural extension of my growing interest in the intersection of design and code. The course focused on building real, interactive mobile interfaces using React Native — bridging the gap between high-fidelity prototypes and production-ready components.", learned: "Learning to code in the medium you design for changes how you design. Understanding the constraints and capabilities of React Native made my interface designs more realistic and more buildable. It also gave me a useful shared language with mobile developers.", highlights: "Practical certificate in React Native mobile development. Applied directly to understanding and communicating mobile UI constraints. Supported growing expertise at the design-code boundary." },
  'design-thinking-regent': { intro: "The Design Thinking certificate from Regent Business School introduced me to a structured problem-solving methodology that has since become central to how I approach every new project. The five-stage framework — empathise, define, ideate, prototype, test — provides a discipline that prevents jumping to solutions before problems are truly understood.", learned: "Design Thinking challenged my instinct to move quickly into solution mode. Learning to stay in the problem space longer, and to validate assumptions with real users before building, has saved significant rework time on multiple projects since.", highlights: "Recognised business school certification in Design Thinking methodology. Applied framework to Power Platform project discovery and scoping. Foundational to a human-centred approach to automation and solution design." },
  'ai-intro-ibm': { intro: "IBM's Introduction to Artificial Intelligence course provided an accessible but substantive foundation in AI concepts — covering machine learning, neural networks, natural language processing, and the practical applications of AI across industries. It was an early touchpoint in what has become a central thread of my career.", learned: "This course sparked a genuine curiosity about AI that has only grown since. Understanding the basics of how models learn — the role of training data, the nature of predictions, the difference between supervised and unsupervised learning — gave me a foundation I've built on continuously.", highlights: "Early AI credential from a globally recognised technology company. Foundation for subsequent AI-focused learning and certifications. Planted the seed for a career direction increasingly centred on AI and automation." },
  'digital-overdose-con': { intro: "Speaking at Digital Overdose Con as an international speaker was a defining moment in establishing my profile as a thought leader in the cybersecurity and technology community. The conference brings together practitioners, researchers, and enthusiasts from across the world, and being invited to present was a significant recognition of my expertise.", learned: "Preparing a conference talk forces a level of clarity and structure that everyday work rarely demands. I learned to distil complex technical content into a compelling narrative — a skill that has since made me a stronger communicator in client presentations, workshops, and mentoring.", highlights: "International speaking engagement at a globally recognised security conference. Established presence as a thought leader in the technology community. Developed public speaking skills that transfer across professional contexts." },
  'hack-south-moderator': { intro: "Volunteering as a Discord server moderator for the Hack South community put me at the centre of one of South Africa's most active cybersecurity communities. The role involved managing conversations, supporting newcomers, enforcing community standards, and helping create an environment where knowledge sharing could thrive.", learned: "Community moderation taught me that healthy communities don't maintain themselves — they require consistent, thoughtful human effort. I developed a much stronger sense of how to set and uphold norms, how to de-escalate conflict, and how to make newcomers feel genuinely welcome.", highlights: "Active contributor to South Africa's leading cybersecurity community. Developed community management and digital facilitation skills. Built lasting connections within the local and global security practitioner network." },
  'ethical-hacking-tcm': { intro: "TCM Security's Practical Ethical Hacking course is widely regarded as one of the most rigorous and hands-on entry points into offensive security. Over six months, the curriculum covered networking fundamentals, active directory attacks, web application hacking, and full penetration testing methodology.", learned: "Ethical hacking fundamentally changes how you think about the systems you build. Understanding how attackers move through networks and exploit misconfigurations made me a much more security-conscious developer and solution architect — particularly when designing Power Platform integrations with sensitive data flows.", highlights: "Completed one of the most respected practical hacking certifications available. Applied security thinking directly to enterprise Power Platform architecture decisions. Foundation for a security-informed approach to all technical work." },
  'dot-development-africa': { intro: "Founded and led a technology consultancy focused on Microsoft Power Platform solutions for South African businesses. Operating as principal consultant and business owner, the role spanned end-to-end delivery — from requirements discovery through to deployment and user adoption — translating low-code capabilities into automation and data solutions for clients across multiple industries. This was the formal transition from executing digital projects to delivering business solutions.", learned: "Consulting from the start of a platform career teaches you that technical skill is only half the job. Understanding client needs, managing expectations, and translating between business language and technical language are the competencies that actually determine whether a project succeeds. Running a practice simultaneously reinforced that delivery quality and commercial sustainability have to be designed together.", highlights: "Conducted end-to-end business requirements gathering and documentation, converting operational needs into functional specifications for Power Platform implementations. Designed and deployed custom business applications using Power Apps, automated workflows with Power Automate, and interactive dashboards with Power BI — frequently integrating with Azure services and third-party data sources. Provided strategic guidance on digital transformation and SaaS platform adoption. Delivered user training and ongoing solution support to ensure sustainable adoption. Managed all aspects of the consulting practice including business development, proposal writing, project scoping, delivery oversight, and client relationship management." },
  'govx-winner': { intro: "Winning the GovX Innovation Challenge, run by the Department of Telecommunications, was a formative experience in applying technology thinking to real public sector problems. The challenge called for innovative solutions that could meaningfully improve government service delivery — a brief that required both technical creativity and social awareness.", learned: "Competing in a government-focused innovation challenge pushed me to think about technology impact at a systemic level. It's one thing to build a clever tool; it's another to design something that could realistically be adopted and sustained within a complex institutional context.", highlights: "National-level innovation challenge winner. Recognition from a government department for applied technology thinking. Early validation of the ability to design solutions with real-world institutional fit." },
  'ai900-azure-ai': { intro: "The AI-900 Azure AI Fundamentals certification from Microsoft provided formal grounding in the core concepts of artificial intelligence as implemented across the Azure ecosystem. The exam covered machine learning fundamentals, computer vision, natural language processing, conversational AI, and responsible AI principles — all within the Microsoft cloud context.", learned: "Earning AI-900 gave me a structured framework for understanding how AI capabilities map to Azure services. It reinforced my instinct for which AI tools are appropriate for which problems — a judgement call that matters enormously when advising clients on Power Platform AI Builder and Copilot Studio integrations.", highlights: "Microsoft-recognised AI fundamentals certification. Foundation for subsequent AI-focused work in Power Platform and Copilot Studio. Formal grounding in responsible AI principles applied to enterprise solutions." },
  'bi-consultants-linkedin': { intro: "LinkedIn Learning's Business Intelligence for Consultants course provided a structured introduction to BI concepts specifically framed for consulting contexts — covering data storytelling, dashboard design principles, and how to communicate analytical findings to non-technical decision makers.", learned: "The consulting frame was what made this course valuable. Understanding how to present data to drive decisions, rather than just to display information, changed how I approach every reporting and analytics project. Clarity and narrative matter as much as accuracy.", highlights: "Applied BI communication skills directly to Power BI deliverables. Improved ability to frame data insights for executive audiences. Complementary to concurrent Azure and Power Platform development learning." },
  'azure-devops-linkedin': { intro: "Azure for DevOps: Continuous Integration on LinkedIn Learning introduced me to the principles and practices of CI/CD pipelines within the Azure ecosystem. The course covered build pipelines, automated testing, and the fundamentals of deploying code reliably and repeatedly.", learned: "Understanding CI/CD changed how I think about solution delivery — particularly around the importance of automated testing and the risks of manual deployment processes. These principles now inform how I approach ALM in Power Platform projects, where governance and deployment pipelines matter enormously.", highlights: "Foundation in Azure DevOps practices applicable to Power Platform ALM. Improved understanding of automated deployment and testing. Directly applicable to enterprise-grade solution delivery." },
  'azure-ad-linkedin': { intro: "Azure Active Directory: Basics on LinkedIn Learning provided a grounding in identity and access management within the Microsoft ecosystem. The course covered directory structure, user and group management, conditional access, and the fundamentals of securing cloud applications.", learned: "Understanding AAD is essential for anyone building on the Microsoft stack. It underpins every permission model in Power Platform, every SharePoint integration, and every Teams deployment. This course demystified concepts I had been working around rather than with.", highlights: "Foundation in Microsoft identity and access management. Directly applicable to Power Platform governance and security design. Supports more confident client conversations about data access and compliance." },
  'azure-admin-linkedin': { intro: "LinkedIn Learning's Azure Administration Essential Training covered the core competencies needed to manage Azure resources — virtual machines, storage, networking, and the broader Azure portal experience. It provided important context for the cloud infrastructure underpinning the Microsoft solutions I work with daily.", learned: "Even as a primarily application-layer practitioner, understanding the infrastructure layer makes me a better solution designer. Knowing what happens under the hood — how resources scale, how costs are incurred, how security boundaries are drawn — informs better architectural decisions.", highlights: "Working knowledge of Azure administration and resource management. Improved ability to collaborate with infrastructure teams on enterprise projects. Supports end-to-end understanding of Microsoft cloud architecture." },
  'digital-volunteer': { intro: "Volunteering with both the Bureau for Rights-Based Development and the United Nations Volunteer programme has been a long-running commitment to using my digital skills in service of meaningful social impact. The work spans digital strategy, tool implementation, and capacity building for organisations working in human rights and development.", learned: "Applying technology in under-resourced civil society contexts teaches you to do more with less and to prioritise ruthlessly. The constraints are different from commercial projects — budget, connectivity, and user digital literacy all require different design decisions — and working within them has made me a more adaptable practitioner.", highlights: "Ongoing volunteer commitment since 2020. Applied digital skills in support of human rights and development organisations. Developed cross-cultural communication and low-resource design capabilities." },
  'bsa-uct': { intro: "The Business Systems Analysis programme at the University of Cape Town was a turning point in how I understood the relationship between organisational processes and technology systems. The curriculum covered requirements elicitation, process modelling, stakeholder management, and the formal methodologies that underpin professional systems analysis.", learned: "UCT's rigour pushed me to think systematically about problems before reaching for solutions. The programme gave me tools — use case diagrams, process maps, stakeholder matrices — that I still use regularly, and a professional discipline that distinguishes good analysis from guesswork.", highlights: "University of Cape Town credential in Business Systems Analysis. Foundation for all subsequent consulting and requirements work. Formal methodology training that continues to inform daily practice." },
  'mpt-accountant': { intro: "Executed end-to-end financial transaction processing within the SAP ERP environment at Master Power Technologies, a leader in engineered power solutions. The contract role centred on data capture, validation, and electronic submission workflows for SARS compliance — supporting the financial data integrity of enterprise-level reporting systems.", learned: "Working inside an enterprise ERP at this scale made visible how much financial accuracy depends on disciplined data entry and well-governed workflows. The SAP environment demanded a level of precision and process adherence that strengthened my instinct for data integrity — a discipline that has carried directly into my approach to data modeling and system design in Power Platform work.", highlights: "Executed end-to-end financial transaction processing within SAP ERP. Managed data capture, validation, and SARS electronic submission workflows for compliance. Supported enterprise financial data integrity for a major engineered power solutions provider." },
  'initec-civils': { intro: "Coordinated financial and operational data across 20 contracting teams comprising 300+ personnel at Initec Civils, utilizing Pastel Partner, Sage Online, Sage Payroll, and PSQL. The role combined financial data aggregation with project analytics, stakeholder reporting, and workflow optimization — and extended into digital infrastructure by engineering websites for three subsidiary companies using Divi and PHP.", learned: "This role was where financial systems work started intersecting with digital solutions design. Analyzing team workflows and designing process improvements that enabled contractors to transition to independent business structures gave me a systems-thinking perspective that I had not previously applied at this scale. The parallel work on web development for subsidiaries planted the seed for what became RMI Web Design.", highlights: "Coordinated financial and operational data across 20 teams and 300+ personnel using Pastel Partner, Sage Online, Sage Payroll, and PSQL. Analyzed and optimized contractor workflows, designing process improvements that enabled independent small business transitions. Engineered digital presence solutions for three subsidiary companies using Divi and PHP. Delivered monthly data analytics, budget forecasting, and system-generated stakeholder reporting. Developed domain expertise in fibre industry operations and ISP data coordination." },
  'office-space-online': { intro: "Managed operational systems for a serviced office environment in Hyde Park, Sandton — overseeing digital client onboarding, service request workflows, and tenant relationship management through CRM-driven coordination. A short contract role that introduced SaaS-enabled service delivery in a high-end professional setting.", learned: "Even a short contract at the intersection of operations and digital client experience reinforces how much the quality of CRM usage and onboarding design shapes client perception. The discipline of managing multiple concurrent client needs through structured digital tooling was a useful data point for understanding service delivery operations.", highlights: "Managed digital client onboarding and service request workflows for a serviced office environment. Utilized CRM tools to coordinate tenant services and streamline communication channels. Operated SaaS-enabled service delivery systems in a professional Hyde Park, Sandton setting." },
  'ontime-accountant': { intro: "Returned to Ontime Readymix Concrete in a Junior Accountant capacity, operating out of the Midrand offices with expanded responsibilities in financial data accuracy, reconciliation, and supplier data management. The role involved direct liaison with major industry suppliers including Lafarge, Sephaku, and Ash Resources.", learned: "Managing supplier data exchange with large industry counterparts taught me how much financial accuracy depends on clean, consistent data flow across organizational boundaries — and how quickly reconciliation problems compound when data standards diverge between systems.", highlights: "Maintained financial data accuracy and reporting workflows within the company accounting systems. Liaised with major industry suppliers including Lafarge, Sephaku, and Ash Resources to facilitate transactional data exchange and reconciliation. Supported accounting system workflows and process integrity across operational reporting." },
  'tracetec': { intro: "Operated and integrated multiple financial and CRM platforms at Tracetec — including Linkserv, Palladium Accounting, Orangeworx Accounting, Pastel Partner, and Support Suite CRM. Managed debtor data lifecycle within ITC listing and regulatory frameworks, served as the accounts department representative on the company vetting committee, and completed technical training in negotiation and legal data handling with Ebersohn Attorneys.", learned: "Multi-platform financial systems work at this stage gave me a foundational understanding of how data moves across systems that are not natively integrated — and what breaks when data standards are inconsistent. The vetting committee role introduced cross-departmental governance in a way that has directly informed how I approach stakeholder engagement in technical delivery roles.", highlights: "Operated and integrated Linkserv, Palladium Accounting, Orangeworx, Pastel Partner, and Support Suite CRM across financial and debtor management workflows. Managed debtor data lifecycle within ITC listing and consumer law compliance frameworks. Served as accounts department representative on the company vetting committee for cross-departmental data governance. Completed technical training in negotiation skills and legal data handling with Ebersohn Attorneys." },
  'profile-cut': { intro: "Administered and processed payroll systems at Profile Cut Dynamics, ensuring accurate data integration between timekeeping, HR records, and financial reporting modules. Managed electronic submissions to SARS and supported system readiness for MIBFA and BEE audits — with a focus on data traceability and compliance reporting structures.", learned: "Payroll and compliance work is unforgiving — errors cascade and audit failures have real consequences. This role built a rigorous attention to data traceability and compliance documentation that has stayed with me across every subsequent role, and translates directly into how I approach governance and audit readiness in Power Platform solutions.", highlights: "Administered and processed payroll systems ensuring accurate data integration across timekeeping, HR records, and financial reporting modules. Managed SARS electronic submissions maintaining regulatory data standards. Supported system readiness for MIBFA and BEE audits with focus on data traceability and compliance reporting structures." },
  'ontime-bookkeeper': { intro: "Provided foundational support for financial data entry and integrity at Ontime Readymix Concrete, ensuring accurate data flow between operational transactions and general ledger systems. A first professional role in financial systems — establishing the discipline of data accuracy and systematic record-keeping that has informed every subsequent position.", learned: "Starting a career in financial data entry teaches you that the integrity of any system begins with the discipline of the people feeding it. The habits formed here — checking, reconciling, maintaining clean records — are not glamorous but they are foundational. They shaped a mindset around data quality that has remained consistent across very different technical contexts.", highlights: "Provided financial data entry and integrity support within the company accounting system. Ensured accurate data flow between operational transactions and general ledger systems. Established foundational professional discipline in financial data accuracy and systematic record-keeping." },
  'rmi-web-design': { intro: "Founded and operated a digital solutions practice delivering end-to-end web design, development, and branding services to over 40 startups and small businesses across Johannesburg. This venture served as a hands-on environment for translating client requirements into functional, performant, and visually cohesive digital platforms — and established the operational discipline that has informed every subsequent role.", learned: "Running a client-facing practice teaches you things no course can. Managing scope, handling feedback that contradicts your instincts, delivering to real deadlines, and keeping clients confident through ambiguity are competencies that only come from doing it. The business operations side — proposals, financial administration, project scoping — gave me a systems view of how digital work gets resourced and delivered that I still draw on.", highlights: "Engineered and deployed 40+ websites using WordPress, Divi, Elementor, WooCommerce, and CPanel with responsive design and SEO fundamentals. Provided integrated branding services including logo design, visual identity systems, and marketing collateral using Adobe Creative Cloud, Canva, and Figma. Managed the full client lifecycle from discovery and proposal through development, launch, and ongoing support. Handled all business functions including development, project management, technical execution, and financial administration." },

// ── Helpers ──
function calcMonths(range) {
  const now = new Date();
  const end = range.end === 'present' ? [now.getFullYear(), now.getMonth()+1] : range.end;
  return (end[0] - range.start[0]) * 12 + (end[1] - range.start[1]);
}
function formatDuration(totalMonths) {
  const yrs = Math.floor(totalMonths / 12), mos = totalMonths % 12;
  if (yrs === 0) return mos + ' month' + (mos !== 1 ? 's' : '');
  if (mos === 0) return yrs + ' year' + (yrs !== 1 ? 's' : '');
  return yrs + ' yr' + (yrs !== 1 ? 's' : '') + ' ' + mos + ' mo' + (mos !== 1 ? 's' : '');
}
// Convert [year, month] to a single integer month index for easy comparison
function toMonthIndex(ym) { return ym[0] * 12 + ym[1]; }
// Merge overlapping ranges and sum the actual unique months worked
function totalWorkMonths(ids) {
  const now = new Date();
  const nowYM = [now.getFullYear(), now.getMonth() + 1];
  // Build list of [startIdx, endIdx] pairs
  const spans = ids
    .filter(id => workRanges[id])
    .map(id => {
      const r = workRanges[id];
      return [toMonthIndex(r.start), toMonthIndex(r.end === 'present' ? nowYM : r.end)];
    });
  if (!spans.length) return 0;
  // Sort by start
  spans.sort((a, b) => a[0] - b[0]);
  // Merge overlapping/adjacent spans
  const merged = [spans[0]];
  for (let i = 1; i < spans.length; i++) {
    const last = merged[merged.length - 1];
    if (spans[i][0] <= last[1]) {
      last[1] = Math.max(last[1], spans[i][1]); // extend
    } else {
      merged.push(spans[i]);
    }
  }
  // Sum the merged spans
  return merged.reduce((sum, s) => sum + (s[1] - s[0]), 0);
}

function updateStats() {
  const bar=document.getElementById('stats-bar'), icon=document.getElementById('stats-icon'), value=document.getElementById('stats-value'), label=document.getElementById('stats-label');
  let stat;

  // Helper: get IDs of work items currently visible on the timeline
  function visibleWorkIds() {
    return [...document.querySelectorAll('#view-roadmap .item.tag-work:not(.hidden)')]
      .map(el => el.getAttribute('onclick')?.match(/'([^']+)'/)?.[1])
      .filter(id => id && workRanges[id]);
  }

  if (activeSkill) {
    const rw = skillWorkMap[activeSkill] || [];
    const vi = [...document.querySelectorAll('#view-roadmap .item:not(.hidden)')];
    const isWork = activeTag === 'work';

    if (isWork) {
      // Intersect skill's work roles with what's actually visible
      const visible = visibleWorkIds();
      const matching = rw.filter(id => visible.includes(id));
      stat = { icon:'💡', color:'#60b4ff', value: matching.length ? formatDuration(totalWorkMonths(matching)) : '0 months', label:'', sub:'' };
    } else if (!activeTag || activeTag === 'all') {
      if (rw.length) {
        // All work roles for this skill (no tag filter restricting)
        stat = { icon:'💡', color:'#60b4ff', value:formatDuration(totalWorkMonths(rw)), label:'', sub:'' };
      } else {
        stat = { icon:'📌', color:'#c084fc', value:vi.length+' item'+(vi.length!==1?'s':''), label:'', sub:'' };
      }
    } else {
      // Skill + non-work tag — count visible items
      const tc = tagStats[activeTag];
      const s = tc ? tc.fn(vi) : { value:vi.length+' item'+(vi.length!==1?'s':''), label:'', sub:'' };
      stat = { icon:tc?.icon||'📌', color:tc?.color||'#c084fc', value:s.value, label:'', sub:'' };
    }
  } else if (activeTag === 'work') {
    // Work tag, no skill filter — sum only visible work items
    const visible = visibleWorkIds();
    const t = visible.length ? totalWorkMonths(visible) : 0;
    stat = { icon:'💼', color:'#60b4ff', value: t ? formatDuration(t) : '0 months', label:'work experience', sub:'' };
  } else if (activeTag !== 'all') {
    const cfg = tagStats[activeTag];
    const mt = (tagFilterMap && tagFilterMap[activeTag]) ? tagFilterMap[activeTag] : [activeTag];
    const vi = [...document.querySelectorAll('#view-roadmap .item:not(.hidden)')].filter(i => mt.some(t => i.classList.contains('tag-'+t)));
    const s = cfg ? cfg.fn(vi) : { value:'—', label:'', sub:'' };
    stat = { icon:cfg?.icon||'✦', color:cfg?.color||'#c084fc', ...s };
  } else {
    const cfg = tagStats['all'];
    stat = { icon:cfg.icon, color:cfg.color, ...cfg.fn() };
  }

  bar.style.borderColor = stat.color + '44'; bar.style.background = stat.color + '11';
  icon.textContent = stat.icon; value.style.color = stat.color; value.textContent = stat.value; label.textContent = stat.label;
  let sub = document.getElementById('stats-sub');
  if (stat.sub) { if (!sub) { sub=document.createElement('div'); sub.id='stats-sub'; sub.className='stats-sub'; label.after(sub); } sub.textContent=stat.sub; } else if (sub) sub.textContent='';
}

function buildSkillPills() {

    if (!matching.length) return;
    const label = document.createElement('div');
    label.style.cssText = 'width:100%;font-size:8px;letter-spacing:0.18em;text-transform:uppercase;color:'+(catColors[cat]||'#a5b4fc')+';opacity:0.7;margin:10px 0 4px;font-family:\'DM Mono\',monospace;';
    label.textContent = cat; grid.appendChild(label);
    matching.forEach(skill => {
      const btn = document.createElement('button');
      btn.className = 'skill-filter-pill'; btn.textContent = skill; btn.dataset.skill = skill;
      btn.onclick = () => applySkillFilter(skill, btn); grid.appendChild(btn);
    });
  });
}

function searchSkills(val) {
  const q = val.toLowerCase();
  const grid = document.getElementById('skill-pills-grid');
  let lastLabel = null, visibleInGroup = 0;
  Array.from(grid.children).forEach(el => {
    if (!el.dataset && el.tagName !== 'BUTTON') { if (lastLabel) lastLabel.style.display = visibleInGroup ? '' : 'none'; lastLabel = el; visibleInGroup = 0; }
    else if (el.dataset.skill === '') el.classList.remove('hidden-pill');
    else if (el.dataset.skill) { const match = el.dataset.skill.toLowerCase().includes(q); el.classList.toggle('hidden-pill', !match); if (match) visibleInGroup++; }
  });
  if (lastLabel) lastLabel.style.display = visibleInGroup ? '' : 'none';
}

function openArticle(id) {

  const tagEl = document.getElementById('art-tag-el'); tagEl.textContent = a.tagLabel; tagEl.className = 'tag tag-' + a.tag;

  document.getElementById('art-title').textContent = a.title;
  const orgEl = document.getElementById('art-org'); orgEl.textContent = a.org; orgEl.style.display = a.org ? 'block' : 'none';
  document.getElementById('art-divider').style.background = a.color;
  const content = articleContent[id];

    contentEl.innerHTML =

      '<p>' + content.learned + '</p>' +
      '<h3 style="font-family:\'Syne\',sans-serif;font-size:13px;font-weight:700;color:' + a.color + ';letter-spacing:0.08em;text-transform:uppercase;margin:24px 0 10px;opacity:0.85;">Key Highlights</h3>' +
      '<ul style="padding-left:18px;display:flex;flex-direction:column;gap:7px;">' + hl + '</ul>';
  } else {
    contentEl.innerHTML = '<p style="opacity:0.4">No content yet.</p>';
  }
  const ft = document.getElementById('art-footer-tag'); ft.textContent = a.tagLabel; ft.className = 'tag tag-' + a.tag;
  const fo = document.getElementById('art-footer-org-tag');
  if (a.org) { fo.textContent = a.org; fo.className = 'tag tag-' + a.tag; fo.style.display = 'inline-block'; } else fo.style.display = 'none';
  const skills = articleSkills[id] || [];
  const ss = document.getElementById('art-skill-tags-section'), sr = document.getElementById('art-skill-tags');
  if (skills.length) {
    ss.style.display = 'flex';
    sr.innerHTML = skills.map(s => '<button class="skill-pill" onclick="filterAndGoBack(\'' + s + '\')" style="border-color:' + a.color + '55;color:' + a.color + '">' + s + '</button>').join('');
  } else ss.style.display = 'none';
  document.getElementById('view-roadmap').classList.remove('active');
  const artView = document.getElementById('view-article'); artView.classList.add('active', 'slide-in');
  window.scrollTo(0, 0); setTimeout(() => artView.classList.remove('slide-in'), 350);
}

let _activePanel = null;

function openPanel(id) {
  const content = panelContent[id];
  if (!content) return;
  _activePanel = id;

  document.getElementById('panel-body').innerHTML = `
    <div class="panel-eyebrow">${content.eyebrow}</div>
    <div class="panel-title">${content.title}</div>
    ${content.render()}
  `;

  // Update dock active state
  document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));
  const dockBtn = document.getElementById('dock-' + id);
  if (dockBtn) dockBtn.classList.add('active');

  // Switch to panel view
  document.getElementById('view-roadmap').classList.remove('active');
  document.getElementById('view-article').classList.remove('active');
  const pv = document.getElementById('view-panel');
  pv.classList.add('active');
  pv.scrollTop = 0;
}

function closePanel() {
  _activePanel = null;
  document.getElementById('view-panel').classList.remove('active');
  document.getElementById('view-roadmap').classList.add('active');
  document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));
  window.scrollTo(0, 0);
}

function goBack() {
  document.getElementById('view-article').classList.remove('active');
  document.getElementById('view-roadmap').classList.add('active');
  window.scrollTo(0, 0);
}

function filterAndGoBack(skill) {
  goBack();
  setTimeout(() => { const p = document.querySelector('#skill-pills-grid [data-skill="' + skill + '"]'); if (p) applySkillFilter(skill, p); }, 50);
}
